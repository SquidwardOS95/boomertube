<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BoomerTube - Sign Up</title>
    <link rel="icon" type="image/png" href="https://files.catbox.moe/h70xzo.png">
    <style>
        body { font-family: Arial, sans-serif; background-color: #fff; margin: 0; padding: 0; }
        #header { width: 960px; margin: 10px auto; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        .logo { width: 130px; }
        
        #reg-container { width: 600px; margin: 40px auto; border: 1px solid #ccc; padding: 20px; background: #f9f9f9; }
        h1 { font-size: 18px; color: #333; margin-top: 0; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 5px; }
        .form-group input { width: 95%; padding: 5px; border: 1px solid #999; }
        
        .btn-reg { background: #ffcc00; border: 1px solid #999; font-weight: bold; padding: 8px 20px; cursor: pointer; }
        .footer-links { font-size: 12px; margin-top: 20px; color: #666; text-align: center; }
    </style>
</head>
<body>

<div id="header">
    <a href="index.html"><img src="https://files.catbox.moe/o1v262.png" alt="BoomerTube" class="logo"></a>
</div>

<div id="reg-container">
    <h1>Create Your BoomerTube Account</h1>
    <p style="font-size: 12px; color: #666;">Join the largest video-sharing community in the world (of 2009)!</p>
    
    <form id="registerForm">
        <div class="form-group">
            <label>Username:</label>
            <input type="text" id="username" required>
        </div>
        <div class="form-group">
            <label>Email Address:</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn-reg">Create My Account</button>
    </form>
</div>

<div class="footer-links">
    Already have an account? <a href="signin.html">Sign In</a>
</div>

</body>
</html>
